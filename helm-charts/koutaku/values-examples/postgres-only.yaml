# Configuration: PostgreSQL for config and logs store
# Usage: helm install koutaku ./koutaku -f values-examples/postgres-only.yaml

# Storage configuration
storage:
  mode: postgres
  configStore:
    enabled: true
  logsStore:
    enabled: true

# Deploy PostgreSQL
postgresql:
  enabled: true
  auth:
    username: koutaku
    password: koutaku_password
    database: koutaku
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 256Mi

# No vector store
vectorStore:
  enabled: false
  type: none

# Koutaku configuration
koutaku:
  client:
    enableLogging: true
  providers: {}
    # Add your provider keys here
    # openai:
    #   keys:
    #     - value: "sk-..."
    #       weight: 1

