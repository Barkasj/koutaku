{{- if and (eq .Values.storage.mode "sqlite") .Values.storage.persistence.enabled (not .Values.storage.persistence.existingClaim) }}
# Headless service for StatefulSet pod DNS resolution
apiVersion: v1
kind: Service
metadata:
  name: {{ include "koutaku.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "koutaku.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.koutaku.cluster.enabled }}
    - port: {{ .Values.koutaku.cluster.gossip.port }}
      targetPort: gossip
      protocol: TCP
      name: gossip
    - port: {{ .Values.koutaku.cluster.gossip.port }}
      targetPort: gossip-udp
      protocol: UDP
      name: gossip-udp
    {{- end }}
  selector:
    {{- include "koutaku.serverSelectorLabels" . | nindent 4 }}
{{- end }}
